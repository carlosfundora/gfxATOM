# ─────────────────────────────────────────────────────────────
# Chatterbox Turbo — GPU Execution Profile
# Validated on FRACTAL (Ryzen 9 3900X / AMD RX 6700 XT gfx1030 / ROCm 7.2)
# ─────────────────────────────────────────────────────────────
# Last Updated: 2026-05-13

model:
  name: "Chatterbox-Turbo-GPU"
  hub_id: "ResembleAI/chatterbox-turbo-ONNX"
  backbone_hub_id: "ResembleAI/chatterbox-turbo"
  variant: "turbo"
  backbone_arch: "GPT2LMHeadModel"
  parameters_m: 350
  num_hidden_layers: 24
  num_heads: 16
  head_dim: 64
  vocab_size: 6563
  sample_rate: 24000

paths:
  model_dir: "/home/local/Projects/models/huggingface/models--ResembleAI--chatterbox-turbo-ONNX/snapshots/d21799bd0354adb85e348b8a0442a8405110a2cf"
  backbone_dir: "/home/local/Projects/models/huggingface/models--ResembleAI--chatterbox-turbo/snapshots/749d1c1a46eb10492095d68fbcf55691ccf137cd"
  default_voice_fallback: "/home/local/Projects/models/huggingface/models--onnx-community--chatterbox-ONNX/snapshots/3cab09af388d3f02bba43443fce88c1f4525ac43/default_voice.wav"

runtime:
  device: "cuda:0"
  dtype: "float16"
  onnx_variant: "fp16"
  intra_op_threads: 12
  inter_op_threads: 1
  graph_optimization_level: "ORT_ENABLE_ALL"

generation:
  max_tokens: 512
  repetition_penalty: 1.2
  temperature: 1.0
  top_k: 50
  exaggeration: 0.5
  cfg_weight: 0
  seed: null

audio:
  response_format: "wav"
  bits_per_sample: 16

dsp:
  enable_agc: false
  enable_soft_compressor: false

gpu:
  hip_visible_devices: "0"
  vram_budget_mb: 900
  torch_compile: false
  attention_backend: "triton"
  gfx_graph:
    enabled: true              # gfxGRAPH outperforms CUDA graphs on ROCm 7.2
    backend: "hip-graphs"
    warmup_iterations: 2

notes: |
  Hybrid CPU/GPU Turbo configuration for maximum throughput.
  
  The GPT2LMHeadModel backbone runs on GPU (~900MB VRAM).
  CPU components use optimized ONNX RT (inter_op=1, intra_op=12, ORT_ENABLE_ALL).
  
  Turbo is ~30% faster than Standard with slightly lower quality due to
  1-step distilled decoder. Best for low-latency / streaming applications.
  
  gfxGRAPH: HIP graph capture planned for future validation.
  GPT2's simpler architecture may benefit more from graph capture than Llama.
